function loadProgressIntoState(p){
  if(!p)return;

  Object.keys(ans).forEach(k=>{converted[k]=typeof ans[k]==='number'?ans[k]:parseInt(ans[k],10)});

}

window.submitOtp=async function(){
  const i=$('otpInput');
  const err=$('otpErr');
  const btn=$('otpBtn');
  const code=(i?i.value:'').trim();
  if(!/^\d{6}$/.test(code)){err.textContent='Introduce el cรณdigo de 6 dรญgitos.';return}
  err.textContent='';
  if(btn){btn.disabled=true;btn.textContent='Verificandoโฆ'}
  try{
    const data=await apiCall('verifyOtp',{email:S.email,code});
    S.sessionToken=data.sessionToken||'';
    S.liveMode=!!data.liveMode;
    if(data.secondsPerQuestion!==undefined)S.secondsPerQuestion=parseInt(data.secondsPerQuestion,10)||0;
    saveSession(S.email,S.sessionToken);
    if(data.found&&data.result){
      loadResultIntoState(S.email,data.result);
      S.screen='results';S.locked=!!S.liveMode;
      render();window.scrollTo({top:0,behavior:'smooth'});
      return;
    }
    S.locked=false;
    S.prizeCode='';S.prizeType=0;S.familyKey='';
    await ensureQuestions();
    if(data.progress){loadProgressIntoState(data.progress)}else{S.ans={};S.cq=0}
    S.screen='quiz';render();window.scrollTo({top:0,behavior:'smooth'});
  }catch(e){
    S.otpError=e.message||'Cรณdigo incorrecto';
    if(err)err.textContent=S.otpError;
    if(btn){btn.disabled=false;btn.textContent='Verificar y continuar โ'}
  }
};

};

function stopQuestionTimer(){
  if(questionTimerId){clearInterval(questionTimerId);questionTimerId=null}
  S.timerForQuestion=-1;
}
function fmtTime(s){const m=Math.floor(s/60),x=s%60;return (m<10?'0':'')+m+':'+(x<10?'0':'')+x}
function startQuestionTimer(){
  const limit=parseInt(S.secondsPerQuestion,10)||0;
  if(limit<=0)return;
  if(S.timerForQuestion===S.cq&&questionTimerId)return;
  stopQuestionTimer();
  S.timerForQuestion=S.cq;
  S.timerSeconds=limit;
  const tick=()=>{
    if(S.screen!=='quiz'){stopQuestionTimer();return}
    const el=document.getElementById('qTimer');
    if(el)el.textContent=fmtTime(S.timerSeconds);
    if(S.timerSeconds<=0){
      stopQuestionTimer();
      if(S.cq>=QS.length-1){finish()}else{next()}
      return;
    }
    S.timerSeconds--;
  };
  tick();
  questionTimerId=setInterval(tick,1000);
}

function renderFeedback(filter){
  const c=$('feedbackList');if(!c)return;
  const items=(S.result&&S.result.feedback)||[];
  let html='';
  items.forEach(q=>{
    const hasC=!!q.hasCorrectFlag;
    const isC=!!q.isCorrect;
    let status,cls;
    if(!hasC){status='neutral';cls='partial'}
    else if(isC){status='correct';cls='correct'}
    else{status='incorrect';cls='incorrect'}
    if(filter!=='all'&&filter!==status)return;
    const icon=status==='correct'?'Correcta':status==='incorrect'?'A mejorar':'Orientativa';
    const chosenText=q.userAnswerText||'(Sin responder)';
    const correctText=q.correctAnswerText||'';
    html+=`<div class="fb-item ${cls}" data-type="${status}">
      <span class="fb-icon">${icon}</span>
      <div class="fb-q">${q.id}. ${q.text}</div>
      <div class="fb-ans yours"><div class="label">Tu respuesta${isC?' โ':hasC?' โ':''}</div>${chosenText}</div>
      ${hasC&&correctText&&!isC?`<div class="fb-ans ideal"><div class="label" style="color:var(--green)">Respuesta recomendada โ</div>${correctText}</div>`:''}
      <div class="fb-explain">${isC||!hasC?'<strong>'+(isC?'ยกCorrecto! ':'๐ก Orientaciรณn: ')+'</strong>'+(q.idealExplanation||''):'<strong>ยฟCรณmo mejorar?</strong> '+(q.wrongExplanation||'')}</div>
    </div>`;
  });
  c.innerHTML=html;
}

window.setFilter=function(f){
  document.querySelectorAll('.ftab').forEach(t=>t.classList.toggle('active',t.dataset.f===f));
  renderFeedback(f);
};

let cameraStream=null,scanInterval=null;
function startCamera(){
  const v=$('teacherVideo'),cn=$('teacherCanvas'),st=$('scanStatus');
  if(!v)return;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){st.textContent='โ  Cรกmara no soportada. Usa el campo manual.';return}
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
  .then(stream=>{cameraStream=stream;v.srcObject=stream;v.play();st.textContent='๐ท Cรกmara activa. Apunta al QR del alumno/a.';
    if(typeof jsQR!=='undefined'){scanInterval=setInterval(()=>scanFrame(v,cn),300);return}
    const sc=document.createElement('script');sc.src='https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';
    sc.onload=()=>{scanInterval=setInterval(()=>scanFrame(v,cn),300)};
    sc.onerror=()=>{st.textContent='โ ๏ธ No se pudo cargar el lector QR. Usa el campo manual.'};
    document.head.appendChild(sc);
  }).catch(()=>{st.textContent='โ ๏ธ No se pudo acceder a la cรกmara. Usa el campo manual.'});
}

window.restartScanner=function(){
  $('scanResult').innerHTML='';
  const st=$('scanStatus');if(st)st.textContent='๐ท Cรกmara activa. Apunta al QR del alumno/a.';
  if(scanInterval)clearInterval(scanInterval);
  const v=$('teacherVideo'),cn=$('teacherCanvas');
  if(v&&cn&&typeof jsQR!=='undefined')scanInterval=setInterval(()=>scanFrame(v,cn),300);
};

function scanFrame(v,cn){
  if(!v||v.readyState!==v.HAVE_ENOUGH_DATA)return;
  const ctx=cn.getContext('2d');cn.width=v.videoWidth;cn.height=v.videoHeight;
  ctx.drawImage(v,0,0);const img=ctx.getImageData(0,0,cn.width,cn.height);
  if(typeof jsQR==='undefined')return;
  const code=jsQR(img.data,img.width,img.height);
  if(code){clearInterval(scanInterval);processQR(code.data,'scanResult');const st=$('scanStatus');if(st)st.textContent='โ ยกQR leรญdo correctamente!';}
}

function stopCamera(){if(scanInterval){clearInterval(scanInterval);scanInterval=null}if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null}}

let currentPrizeMode='uniform';
function setPrizeMode(mode){
  currentPrizeMode=mode;
  const uBtn=$('modeUniform'),cBtn=$('modeCustom');
  if(uBtn)uBtn.style.background=mode==='uniform'?'var(--green-light)':'';
  if(uBtn)uBtn.style.borderColor=mode==='uniform'?'var(--green)':'';
  if(cBtn)cBtn.style.background=mode==='custom'?'var(--green-light)':'';
  if(cBtn)cBtn.style.borderColor=mode==='custom'?'var(--green)':'';

  const cfg=adminConfig||{};
  const ini=cfg.initialStock||{};
  const div=$('prizeConfig');if(!div)return;

  if(mode==='uniform'){
    const ref=ini[Object.keys(FAM)[0]]||{names:['Premio tipo 1','Premio tipo 2','Premio tipo 3'],counts:[10,5,2]};
    const famChips=Object.keys(FAM).map(k=>`<span class="chip c-${k}" style="margin:2px">${FAM[k].emoji} ${FAM[k].nombre}</span>`).join('');
    div.innerHTML=`
      <div style="background:var(--green-light);border:1.5px solid var(--green);border-radius:10px;padding:12px;margin-bottom:14px;text-align:center">
        <div style="font-size:11px;font-weight:700;color:var(--green);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Mismo premio para las 5 familias</div>
        <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px">${famChips}</div>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:4px;align-items:center;padding:0 4px">
        <span style="flex:0 0 50px"></span>
        <span style="flex:2;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Nombre</span>
        <span style="flex:1;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center">Cantidad</span>
      </div>`+[0,1,2].map(i=>`
      <div style="display:flex;gap:6px;margin-bottom:8px;align-items:center">
        <span style="font-size:11px;font-weight:700;color:var(--green);width:50px">Tipo ${i+1}</span>
        <input id="uName${i}" type="text" value="${(ref.names[i]||'').replace(/"/g,'&quot;')}" placeholder="Nombre del premio"
          style="flex:2;padding:8px;border:1.5px solid var(--border);border-radius:7px;font-family:'Outfit';font-size:13px;outline:none">
        <input id="uCount${i}" type="number" value="${ref.counts[i]||0}" min="0" placeholder="0"
          style="flex:1;padding:8px;border:1.5px solid var(--border);border-radius:7px;font-family:'Outfit';font-size:13px;text-align:center;outline:none">
      </div>`).join('');
  }else{
    const FKEYS=Object.keys(FAM);
    div.innerHTML=FKEYS.map(fk=>{
      const f=FAM[fk];
      const ref=ini[fk]||{names:['Premio tipo 1','Premio tipo 2','Premio tipo 3'],counts:[10,5,2]};
      return `
      <div style="margin-bottom:14px;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg)">
        <div style="font-size:12px;font-weight:700;color:var(--${fk});margin-bottom:8px">${f.emoji} ${f.nombre}</div>
        ${[0,1,2].map(i=>`
          <div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
            <span style="font-size:10px;width:40px;color:var(--muted)">T${i+1}</span>
            <input id="c_${fk}_n${i}" type="text" value="${(ref.names[i]||'').replace(/"/g,'&quot;')}" placeholder="Nombre"
              style="flex:2;padding:6px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none">
            <input id="c_${fk}_c${i}" type="number" value="${ref.counts[i]||0}" min="0"
              style="flex:1;padding:6px;border:1px solid var(--border);border-radius:6px;font-size:12px;text-align:center;outline:none">
          </div>`).join('')}
      </div>`;
    }).join('');
  }
}

window.adminSavePrizes=async function(){
  const msg=$('prizeMsg');
  const btn=$('savePrizesBtn');
  if(btn){btn.disabled=true;btn.textContent='Guardandoโฆ'}
  let body={adminPassword,mode:currentPrizeMode};
  if(currentPrizeMode==='uniform'){
    body.names=[0,1,2].map(i=>($('uName'+i)||{}).value||'Premio tipo '+(i+1));
    body.counts=[0,1,2].map(i=>parseInt(($('uCount'+i)||{}).value,10)||0);
  }else{
    const prizes={};
    Object.keys(FAM).forEach(fk=>{
      prizes[fk]={
        names:[0,1,2].map(i=>($('c_'+fk+'_n'+i)||{}).value||'Premio tipo '+(i+1)),
        counts:[0,1,2].map(i=>parseInt(($('c_'+fk+'_c'+i)||{}).value,10)||0),
      };
    });
    body.prizes=prizes;
  }
  try{
    const data=await apiCall('adminSetPrizes',body);
    adminStock=data.stock;
    adminConfig=adminConfig||{};
    adminConfig.liveMode=true;
    adminConfig.initialStock=data.initialStock;
    if(msg){msg.style.color='var(--green)';msg.textContent='โ Premios guardados. Modo en vivo activado.'}
    setTimeout(()=>{S.screen='admin';render()},1200);
  }catch(e){
    if(msg){msg.style.color='var(--red)';msg.textContent='Error: '+e.message}
    if(btn){btn.disabled=false;btn.textContent='๐พ Guardar premios y activar modo en vivo'}
  }
};

};

window.adminSaveEmail=async function(){
  const v=(($('adminEmailInput')||{}).value||'').trim();
  const msg=$('emailMsg');
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){if(msg){msg.style.color='var(--red)';msg.textContent='Correo no vรกlido.'}return}
  try{
    await apiCall('adminSetEmail',{adminPassword,adminEmail:v});
    if(adminConfig)adminConfig.adminEmail=v;
    if(msg){msg.style.color='var(--green)';msg.textContent='โ Correo guardado.'}
  }catch(e){if(msg){msg.style.color='var(--red)';msg.textContent='Error: '+e.message}}
};

window.adminSaveTimer=async function(){
  const v=parseInt(($('timerSeconds')||{}).value||'0',10);
  const msg=$('timerMsg');
  if(isNaN(v)||v<0||v>600){if(msg){msg.style.color='var(--red)';msg.textContent='Introduce un valor entre 0 y 600.'}return}
  try{
    await apiCall('adminSetTimer',{adminPassword,secondsPerQuestion:v});
    if(adminConfig)adminConfig.secondsPerQuestion=v;
    S.secondsPerQuestion=v;
    if(msg){msg.style.color='var(--green)';msg.textContent=v===0?'โ Guardado. Sin lรญmite de tiempo.':'โ Guardado. '+v+' segundos por pregunta.'}
  }catch(e){if(msg){msg.style.color='var(--red)';msg.textContent='Error: '+e.message}}
};

async function loadAdminStats(){
  const card=$('statsCard');if(!card)return;
  try{
    const data=await apiCall('adminGetStats',{adminPassword});
    const stats=data.scanStats||{};
    const cfg=data.config||{};
    const stock=data.stock||{};
    const ini=cfg.initialStock||{};
    const FKEYS=Object.keys(FAM);
    let html=`<h3 style="font-family:'Fraunces',serif;font-size:16px;margin-bottom:10px">๐ Estadรญsticas</h3>`;
    html+=`<p style="font-size:13px;margin-bottom:14px"><strong>${data.testCount||0}</strong> tests completados en total</p>`;
    html+=`<table style="width:100%;font-size:12px;border-collapse:collapse">
      <tr style="background:var(--green);color:#fff"><th style="padding:6px;text-align:left;border-radius:6px 0 0 0">Familia</th><th style="padding:6px">Tipo</th><th style="padding:6px">Total</th><th style="padding:6px">Repartidos</th><th style="padding:6px;border-radius:0 6px 0 0">Restantes</th></tr>`;
    FKEYS.forEach(fk=>{
      const f=FAM[fk];
      [1,2,3].forEach((pt,pi)=>{
        const total=ini[fk]?ini[fk].counts[pi]:'-';
        const remaining=stock[fk]?stock[fk].counts[pi]:0;
        const distributed=stats[fk]?stats[fk][pt]:0;
        const name=stock[fk]?stock[fk].names[pi]:'';
        html+=`<tr style="border-bottom:1px solid var(--border)${pi===0?';border-top:2px solid var(--border)':''}">
          <td style="padding:5px;font-weight:${pi===0?'600':'400'}">${pi===0?(f.emoji+' '+f.nombre):''}</td>
          <td style="padding:5px;text-align:center;color:var(--muted)">${name||'T'+pt}</td>
          <td style="padding:5px;text-align:center">${total}</td>
          <td style="padding:5px;text-align:center;color:var(--amber);font-weight:600">${distributed}</td>
          <td style="padding:5px;text-align:center;color:var(--green);font-weight:600">${remaining}</td>
        </tr>`;
      });
    });
    html+=`</table>`;
    card.innerHTML=html;
  }catch(e){
    card.innerHTML=`<p style="color:var(--red)">Error cargando estadรญsticas: ${e.message}</p>`;
  }
}

const FKEYS_FOR_ADMIN=Object.keys(FAM);

async function bootstrap(){
  render();
  if(BACKEND_URL){
    try{const m=await apiCall('getMode',{});S.liveMode=!!m.liveMode;if(m.secondsPerQuestion!==undefined)S.secondsPerQuestion=parseInt(m.secondsPerQuestion,10)||0}catch(e){}
    loadQuestionsFromBackend().catch(()=>{});
  }
  const sess=loadSession();
  if(!sess||!BACKEND_URL)return;
  try{
    const data=await apiCall('getMyResults',{email:sess.email,sessionToken:sess.sessionToken});
    S.email=sess.email;S.sessionToken=sess.sessionToken;
    if(data.liveMode!==undefined)S.liveMode=!!data.liveMode;
    if(data.found){
      loadResultIntoState(sess.email,data.result);
      S.screen='results';S.locked=!!S.liveMode;
      render();
    }else if(data.progress){
      await ensureQuestions();
      loadProgressIntoState(data.progress);
      S.locked=false;S.prizeCode='';S.prizeType=0;S.familyKey='';
      S.screen='quiz';render();
    }
  }catch(e){
    clearSession();
  }
}
bootstrap();
