// Endpoint del backend (Cloud Run, Klasvid GCP, europe-west1)
// Guía para redesplegar en backend/README e backend/deploy.sh
const BACKEND_URL = 'https://lbc-orientacion-993870750225.europe-west1.run.app/api';

// Llama al backend. Usa text/plain para evitar preflight CORS.
async function apiCall(action, body){
  if(!BACKEND_URL) throw new Error('Backend no configurado. Edita BACKEND_URL en index.html');
  const payload = Object.assign({action:action}, body||{});
  const res = await fetch(BACKEND_URL, {
    method:'POST',
    redirect:'follow',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if(!data.ok) throw new Error(data.error || 'error backend');
  return data;
}

wrongExplanation:"Callarte genera frustración acumulada. Responder agresivamente daña las relaciones. Consejo: usa el mensaje-yo ('Yo siento que...' en lugar de 'Tú siempre...')."},

{id:7,section:"soft",skill:"asertividad",text:"Un compañero se atribuye el mérito de una idea tuya. ¿Qué haces?",
options:[{text:"Hablo con él/ella directamente: 'Esa idea la propuse yo, ¿lo recuerdas?'",scores:{admin:2,comercio:2,obra:2,electro:2,textil:2},correct:true},{text:"Lo dejo pasar, no merece la pena discutir",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Se lo cuento a otros para que sepan la verdad",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Lo denuncio formalmente al profesor o superior",scores:{admin:1,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"Reclamar lo tuyo de forma directa y respetuosa es asertividad pura. No es pelear sino poner límites claros.",
wrongExplanation:"Callarte refuerza que te quiten méritos. Hablar a espaldas genera desconfianza. Consejo: documenta tus ideas (emails, notas)."},

{id:8,section:"soft",skill:"asertividad",text:"Te piden hacer algo que crees que no es correcto éticamente. ¿Cómo actúas?",
options:[{text:"Expreso mi desacuerdo con argumentos y propongo una alternativa ética",scores:{admin:3,comercio:2,obra:3,electro:2,textil:1},correct:true},{text:"Lo hago porque me lo mandan, no quiero problemas",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Me niego rotundamente sin dar explicaciones",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Consulto con otros compañeros qué harían ellos",scores:{admin:1,comercio:1,obra:1,electro:1,textil:1},correct:false}],
idealExplanation:"La integridad profesional requiere valentía para decir no cuando algo no es ético, pero también inteligencia para argumentar y ofrecer alternativas.",
wrongExplanation:"Obedecer sin cuestionar puede llevarte a situaciones legales graves. Consejo: conoce tus derechos laborales y propón siempre soluciones."},

{id:9,section:"soft",skill:"asertividad",text:"En una discusión grupal, todos opinan diferente a ti pero tú tienes datos que apoyan tu postura. ¿Qué haces?",
options:[{text:"Presento mis datos con respeto: 'Entiendo vuestro punto, pero los datos muestran que...'",scores:{admin:3,comercio:2,obra:3,electro:3,textil:1},correct:true},{text:"Cambio de opinión para no ser el/la diferente",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Insisto en mi postura hasta que me den la razón",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Me callo y pienso que ya se darán cuenta",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"Defender una postura basada en datos, reconociendo las otras opiniones, es asertividad madura y argumentación fundamentada.",
wrongExplanation:"Ceder por presión social es conformismo. Insistir sin escuchar es agresividad. Consejo: usa frases puente como 'Entiendo lo que dices y además...'"},

{id:10,section:"soft",skill:"asertividad",text:"¿Cómo pides ayuda cuando la necesitas?",
options:[{text:"Identifico exactamente qué necesito y pido de forma clara y directa",scores:{admin:2,comercio:2,obra:2,electro:2,textil:2},correct:true},{text:"Espero a que alguien se dé cuenta de que necesito ayuda",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Doy muchas vueltas antes de pedir, me da vergüenza",scores:{admin:0,comercio:0,obra:0,electro:0,textil:1},correct:false},{text:"Solo pido ayuda cuando ya es demasiado tarde",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"Saber pedir ayuda de forma clara y oportuna es una competencia profesional, no una debilidad.",
wrongExplanation:"No pedir ayuda por orgullo o vergüenza lleva a errores. Consejo: sé específico/a: no digas 'necesito ayuda', di 'necesito que me expliques cómo funciona X'."},

{id:11,section:"soft",skill:"don_gentes",text:"Llegas a un sitio nuevo donde no conoces a nadie. ¿Qué haces?",
options:[{text:"Me presento con naturalidad y busco puntos en común para conversar",scores:{admin:1,comercio:3,obra:1,electro:1,textil:2},correct:true},{text:"Espero a que alguien me hable primero",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Me quedo en mi sitio mirando el móvil",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Me acerco solo si veo a alguien que parece interesante",scores:{admin:0,comercio:1,obra:0,electro:0,textil:1},correct:false}],
idealExplanation:"La iniciativa social y la capacidad de conectar con desconocidos es fundamental en comercio, ventas y trabajo en equipo.",
wrongExplanation:"Esperar pasivamente limita oportunidades. Consejo: prepara una presentación sencilla y practica en situaciones de baja presión."},

{id:12,section:"soft",skill:"don_gentes",text:"Un cliente o compañero está visiblemente enfadado. ¿Cómo actúas?",
options:[{text:"Escucho activamente, empatizo y busco entender su problema antes de responder",scores:{admin:2,comercio:3,obra:1,electro:1,textil:2},correct:true},{text:"Le pido que se calme antes de hablar",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Intento resolver su problema rápido para que se vaya",scores:{admin:1,comercio:1,obra:1,electro:1,textil:0},correct:false},{text:"Llamo a un superior para que lo gestione",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"La escucha activa y la empatía desarman el enfado. Antes de solucionar, hay que hacer sentir al otro escuchado.",
wrongExplanation:"Decir 'cálmate' suele empeorar la situación. Consejo: usa frases como 'Entiendo tu frustración', mantén contacto visual y no interrumpas."},

{id:13,section:"soft",skill:"don_gentes",text:"¿Cómo te describirían tus amigos o compañeros?",
options:[{text:"Cercano/a, buen/a comunicador/a y siempre dispuesto/a a ayudar",scores:{admin:1,comercio:3,obra:1,electro:1,textil:2},correct:true},{text:"Reservado/a pero fiable cuando me necesitan",scores:{admin:2,comercio:0,obra:2,electro:2,textil:0},correct:false},{text:"Divertido/a pero a veces poco serio/a",scores:{admin:0,comercio:1,obra:0,electro:0,textil:1},correct:false},{text:"Independiente, voy a lo mío",scores:{admin:0,comercio:0,obra:1,electro:1,textil:0},correct:false}],
idealExplanation:"Cercanía, comunicación y disponibilidad definen un profesional con excelente don de gentes, esencial en ventas y gestión de equipos.",
wrongExplanation:"Ser reservado es válido pero limita oportunidades de networking. Consejo: practica el interés genuino por los demás."},

{id:14,section:"soft",skill:"don_gentes",text:"En una feria o evento del centro, ¿cuál sería tu papel ideal?",
options:[{text:"Recibir visitantes, explicar proyectos y conectar con la gente",scores:{admin:1,comercio:3,obra:0,electro:0,textil:2},correct:true},{text:"Preparar la documentación y materiales del stand",scores:{admin:3,comercio:0,obra:1,electro:1,textil:0},correct:false},{text:"Montar la instalación técnica del espacio",scores:{admin:0,comercio:0,obra:2,electro:3,textil:0},correct:false},{text:"Diseñar la decoración y la imagen visual",scores:{admin:0,comercio:1,obra:0,electro:0,textil:3},correct:false}],
idealExplanation:"El trato directo con el público demuestra simpatía natural y capacidad de comunicación, habilidades que abren puertas laborales.",
wrongExplanation:"Todas las opciones son valiosas, pero el don de gentes se demuestra en la interacción directa. Consejo: empieza poco a poco y ve ganando confianza."},

{id:15,section:"soft",skill:"don_gentes",text:"¿Cómo reaccionas ante alguien con opiniones muy diferentes a las tuyas?",
options:[{text:"Muestro curiosidad genuina: '¿Por qué piensas eso? Me interesa entenderlo'",scores:{admin:2,comercio:3,obra:1,electro:1,textil:2},correct:true},{text:"Respeto su opinión pero no la comento",scores:{admin:1,comercio:0,obra:1,electro:1,textil:0},correct:false},{text:"Intento convencerle de que mi postura es la correcta",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Evito el tema para no crear conflicto",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"La curiosidad genuina ante la diversidad de opiniones es la base de relaciones profesionales saludables.",
wrongExplanation:"Evitar temas no fomenta el diálogo. Consejo: practica la escucha activa, haz preguntas abiertas. El respeto no implica acuerdo."},

{id:16,section:"soft",skill:"resolucion_conflictos",text:"Dos compañeros de tu equipo discuten y el proyecto se paraliza. ¿Qué haces?",
options:[{text:"Hablo con cada uno por separado, entiendo sus posturas y propongo un acuerdo",scores:{admin:2,comercio:3,obra:2,electro:1,textil:1},correct:true},{text:"Espero a que se les pase y sigan trabajando",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Tomo partido por quien creo que tiene razón",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Se lo cuento al profesor/jefe para que lo resuelva",scores:{admin:1,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"La mediación es una habilidad de liderazgo muy valiosa. Escuchar ambas partes en privado y buscar el interés común demuestra madurez emocional.",
wrongExplanation:"Esperar no resuelve nada; tomar partido polariza más. Consejo: usa la técnica 'escuchar-validar-proponer'."},

{id:17,section:"soft",skill:"resolucion_conflictos",text:"Un cliente se queja de un servicio que tú no has prestado pero que es de tu departamento. ¿Qué haces?",
options:[{text:"Asumo la responsabilidad del departamento, me disculpo y busco la solución",scores:{admin:2,comercio:3,obra:1,electro:1,textil:1},correct:true},{text:"Le explico que no fui yo y le derivo a mi compañero",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Le atiendo lo justo y le pido que llame en otro momento",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Me disculpo profusamente y prometo que no volverá a pasar",scores:{admin:1,comercio:1,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"El sentido de equipo y la orientación al cliente implican asumir responsabilidad colectiva. El cliente no debe conocer problemas internos.",
wrongExplanation:"Derivar al cliente o echar culpa genera mala imagen. Consejo: usa 'Me hago cargo + Acción concreta + Seguimiento'."},

{id:18,section:"soft",skill:"resolucion_conflictos",text:"En tu equipo hay una persona que siempre impone sus ideas y no escucha. ¿Cómo lo gestionas?",
options:[{text:"En privado le explico cómo su actitud afecta al equipo, con ejemplos concretos",scores:{admin:2,comercio:2,obra:2,electro:2,textil:2},correct:true},{text:"Le ignoro y hago mi parte del trabajo",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Le planto cara delante de todos",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Me quejo al profesor/jefe",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"Abordar problemas de comportamiento en privado, con datos concretos, es resolución de conflictos en estado puro.",
wrongExplanation:"Ignorar el problema lo empeora. Confrontar en público humilla. Consejo: usa 'Situación + Impacto + Petición'."},

{id:19,section:"soft",skill:"resolucion_conflictos",text:"Has cometido un error que afecta al trabajo de otros. ¿Cómo lo manejas?",
options:[{text:"Lo reconozco inmediatamente, pido disculpas y propongo cómo repararlo",scores:{admin:3,comercio:2,obra:3,electro:2,textil:1},correct:true},{text:"Intento arreglarlo sin que nadie se entere",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Busco si alguien más contribuyó al error para compartir culpa",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Espero a que me lo digan antes de admitirlo",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"Reconocer errores con rapidez y proponer soluciones genera confianza y respeto en cualquier sector profesional.",
wrongExplanation:"Ocultar errores puede tener consecuencias graves. Consejo: practica 'Error + Disculpa + Plan de acción'. Los errores son oportunidades de aprendizaje."},

{id:20,section:"soft",skill:"resolucion_conflictos",text:"Dos personas de tu entorno tienen un conflicto que te afecta indirectamente. ¿Qué haces?",
options:[{text:"Les propongo hablar los tres juntos, facilito el diálogo pero no tomo partido",scores:{admin:1,comercio:3,obra:1,electro:1,textil:2},correct:true},{text:"Me mantengo neutral y no me meto",scores:{admin:1,comercio:0,obra:1,electro:1,textil:0},correct:false},{text:"Apoyo al que creo que tiene razón",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Me aparto del conflicto aunque me perjudique",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"Facilitar el diálogo sin tomar partido es mediación profesional. Crear el espacio para que se escuchen es una competencia muy demandada.",
wrongExplanation:"Mantenerse al margen cuando te afecta es evitación. Consejo: aprende técnicas de mediación. Pregunta '¿Qué necesitas?' en lugar de '¿Quién tiene razón?'"},

{id:21,section:"soft",skill:"negociacion",text:"Estás comprando un producto y crees que el precio es alto. ¿Cómo actúas?",
options:[{text:"Investigo precios de mercado, presento datos y propongo un precio justo para ambos",scores:{admin:3,comercio:3,obra:1,electro:1,textil:1},correct:true},{text:"Acepto el precio, no me gusta regatear",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Le digo directamente que es caro y pido descuento",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Me voy a buscar otro sitio más barato",scores:{admin:0,comercio:1,obra:0,electro:0,textil:1},correct:false}],
idealExplanation:"Negociar con datos es profesional. Investigar el mercado y buscar acuerdos beneficiosos para ambas partes es la base del comercio.",
wrongExplanation:"Aceptar siempre te perjudica. Pedir descuento sin argumentos es poco convincente. Consejo: antes de negociar, investiga siempre y lleva datos comparativos."},

{id:22,section:"soft",skill:"negociacion",text:"Tu jefe te propone un horario que no te conviene. ¿Cómo lo gestionas?",
options:[{text:"Le explico mi situación, propongo una alternativa concreta y busco un acuerdo",scores:{admin:2,comercio:2,obra:2,electro:2,textil:2},correct:true},{text:"Acepto sin protestar, es el jefe",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Le digo que no puedo y ya está",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Acepto pero luego falto o llego tarde",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"Negociar condiciones con propuestas concretas demuestra madurez profesional. No es confrontación: es búsqueda de soluciones.",
wrongExplanation:"Aceptar sin querer y luego incumplir es la peor opción. Consejo: siempre ofrece una contrapartida. Negocia desde la solución, no desde el problema."},

{id:23,section:"soft",skill:"negociacion",text:"En un proyecto grupal, quieres hacer una parte que otro compañero también quiere. ¿Cómo lo resuelves?",
options:[{text:"Propongo dividir esa parte o alternar, buscando que ambos aportemos",scores:{admin:1,comercio:2,obra:2,electro:2,textil:2},correct:true},{text:"Le cedo mi preferencia para evitar conflicto",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Argumento por qué yo debería hacerlo",scores:{admin:1,comercio:1,obra:1,electro:1,textil:0},correct:false},{text:"Le pido al profesor que decida",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"Buscar soluciones creativas donde ambas partes ganen es la esencia de la negociación colaborativa.",
wrongExplanation:"Ceder siempre frustra. Imponer genera resentimiento. Consejo: ante un conflicto de intereses, piensa en opciones creativas."},

{id:24,section:"soft",skill:"negociacion",text:"Un proveedor no cumple los plazos acordados. ¿Cómo actúas?",
options:[{text:"Le contacto, documento el incumplimiento y negocio una compensación o solución",scores:{admin:3,comercio:2,obra:3,electro:2,textil:1},correct:true},{text:"Le doy más tiempo, todos tenemos imprevistos",scores:{admin:0,comercio:0,obra:0,electro:0,textil:1},correct:false},{text:"Cambio de proveedor sin más",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Me enfado y le amenazo con denunciarle",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"Documentar, comunicar y negociar compensaciones es gestión profesional de conflictos comerciales.",
wrongExplanation:"Dar más tiempo sin consecuencias incentiva retrasos. Amenazar rompe relaciones. Consejo: lleva siempre registro escrito de acuerdos."},

{id:25,section:"soft",skill:"negociacion",text:"¿Cuál es la clave de una buena negociación para ti?",
options:[{text:"Preparación (datos), escucha activa y buscar que ambas partes ganen",scores:{admin:3,comercio:3,obra:2,electro:2,textil:1},correct:true},{text:"Ser más listo que el otro y obtener la mayor ventaja",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Tener paciencia y esperar a que el otro ceda",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"No negociar: si algo no me gusta, busco otra opción",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"La negociación profesional se basa en preparación, escucha y acuerdos mutuamente beneficiosos.",
wrongExplanation:"Ver la negociación como batalla genera relaciones tóxicas. Consejo: prepara siempre tus datos, tu objetivo mínimo y una alternativa."},

{id:26,section:"soft",skill:"organizacion",text:"¿Cómo organizas tus materiales de estudio o trabajo?",
options:[{text:"Digital y físicamente ordenado: carpetas etiquetadas, archivos con nombre lógico",scores:{admin:3,comercio:1,obra:2,electro:2,textil:0},correct:true},{text:"Tengo un orden mental pero mi escritorio es un caos",scores:{admin:0,comercio:1,obra:0,electro:1,textil:1},correct:false},{text:"Solo ordeno cuando busco algo y no lo encuentro",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Lo organizo de forma visual: colores, post-its, mood boards",scores:{admin:0,comercio:1,obra:0,electro:0,textil:3},correct:false}],
idealExplanation:"La organización sistemática ahorra tiempo y reduce errores. Es especialmente valorada en administración e ingeniería.",
wrongExplanation:"El 'orden mental' falla cuando hay mucho volumen. Consejo: convención de nombres (FECHA_ASIGNATURA_Tema) y 5 min al día para ordenar."},

{id:27,section:"soft",skill:"organizacion",text:"Tienes 5 tareas urgentes y solo puedes hacer 3 hoy. ¿Cómo decides?",
options:[{text:"Evalúo impacto y urgencia, hago primero las de mayor consecuencia",scores:{admin:3,comercio:2,obra:3,electro:2,textil:0},correct:true},{text:"Hago las que me gustan primero",scores:{admin:0,comercio:0,obra:0,electro:0,textil:1},correct:false},{text:"Intento hacer las 5 aunque sea a medias",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Empiezo por la más rápida para ir tachando",scores:{admin:1,comercio:1,obra:0,electro:1,textil:1},correct:false}],
idealExplanation:"Priorizar por impacto y urgencia (Matriz de Eisenhower) es la técnica más efectiva de gestión del tiempo.",
wrongExplanation:"Hacer todo a medias garantiza mala calidad. Consejo: clasifica en 4 cuadrantes: urgente+importante, importante no urgente, urgente no importante, ni una ni otra."},

{id:28,section:"soft",skill:"organizacion",text:"¿Qué opinas de los plazos y fechas límite?",
options:[{text:"Son necesarios: me ayudan a estructurar mi trabajo y cumplir objetivos",scores:{admin:3,comercio:2,obra:3,electro:3,textil:1},correct:true},{text:"Me agobinan, prefiero trabajar a mi ritmo",scores:{admin:0,comercio:0,obra:0,electro:0,textil:1},correct:false},{text:"Los cumplo solo si alguien los controla",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false},{text:"Son orientativos, no hay que tomárselos tan en serio",scores:{admin:0,comercio:0,obra:0,electro:0,textil:0},correct:false}],
idealExplanation:"Los plazos son la columna vertebral de cualquier proyecto. Verlos como aliados es madurez profesional.",
wrongExplanation:"Si te agobinan, el problema está en la planificación. Consejo: divide cada plazo final en mini-plazos intermedios con margen."},

{id:29,section:"soft",skill:"creatividad",text:"Si pudieras crear algo desde cero, ¿qué elegirías?",
options:[{text:"Un sistema de gestión empresarial eficiente",scores:{admin:3,comercio:0,obra:1,electro:2,textil:0},correct:false},{text:"Una campaña de marketing viral o tienda online",scores:{admin:0,comercio:3,obra:0,electro:0,textil:1},correct:false},{text:"Un puente, edificio sostenible o instalación técnica",scores:{admin:0,comercio:0,obra:3,electro:2,textil:0},correct:false},{text:"Una colección de moda o vestuario para una película",scores:{admin:0,comercio:0,obra:0,electro:0,textil:3},correct:false}],
idealExplanation:"No hay respuesta correcta: tu elección refleja tus verdaderas pasiones. La motivación intrínseca es el mejor predictor de éxito profesional.",
wrongExplanation:"No hay respuesta incorrecta. Consejo: reflexiona sobre qué te haría levantarte motivado/a cada lunes. Esa es tu vocación."},

{id:30,section:"soft",skill:"creatividad",text:"¿Cómo generas ideas nuevas?",
options:[{text:"Analizo datos y busco patrones o ineficiencias",scores:{admin:3,comercio:1,obra:2,electro:2,textil:0},correct:false},{text:"Observo tendencias, competencia y lo que funciona en otros sectores",scores:{admin:1,comercio:3,obra:0,electro:0,textil:2},correct:false},{text:"Experimento con tecnología y materiales",scores:{admin:0,comercio:0,obra:2,electro:3,textil:2},correct:false},{text:"Dibujo, boceto y dejo volar la imaginación",scores:{admin:0,comercio:0,obra:1,electro:0,textil:3},correct:false}],
idealExplanation:"No hay forma 'correcta' de generar ideas. Cada estilo creativo apunta a una familia profesional. Conocerte es clave.",
wrongExplanation:"No hay respuesta incorrecta. Consejo: identifica tu estilo creativo natural y poténcialo."},

{id:31,section:"soft",skill:"trabajo_equipo",text:"¿Cuál es tu rol natural en un equipo?",

const LS_SESSION='lbc_session';
function saveSession(email,sessionToken){
  try{localStorage.setItem(LS_SESSION,JSON.stringify({email,sessionToken}))}catch(e){}
}
function loadSession(){
  try{const raw=localStorage.getItem(LS_SESSION);if(!raw)return null;const p=JSON.parse(raw);return(p&&p.email&&p.sessionToken)?p:null}catch(e){return null}
}

// SCORING
// âââââââââââââââââââââââââââââââââââââââââââ
function getScores(){
  const t={admin:0,comercio:0,obra:0,electro:0,textil:0};
  const mx={admin:0,comercio:0,obra:0,electro:0,textil:0};
  QS.forEach(q=>{
    Object.keys(t).forEach(f=>{mx[f]+=Math.max(...q.options.map(o=>o.scores[f]))});
    if(S.ans[q.id]!==undefined){const c=q.options[S.ans[q.id]];Object.keys(t).forEach(f=>{t[f]+=c.scores[f]})}
  });
  const pcts={};Object.keys(t).forEach(f=>{pcts[f]=mx[f]>0?Math.round(t[f]/mx[f]*100):0});
  return{totals:t,pcts};
}

function getSoftScores(){
  const sk={};Object.keys(SSKILLS).forEach(k=>{sk[k]={s:0,m:0,correct:0,total:0}});
  QS.filter(q=>q.section==='soft').forEach(q=>{
    const k=q.skill;if(!sk[k])return;sk[k].total++;
    const mx=Math.max(...q.options.map(o=>Object.values(o.scores).reduce((a,b)=>a+b,0)));
    sk[k].m+=mx;
    if(S.ans[q.id]!==undefined){const c=q.options[S.ans[q.id]];sk[k].s+=Object.values(c.scores).reduce((a,b)=>a+b,0);if(c.correct)sk[k].correct++}
  });
  return sk;
}

function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='LBC-';for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}

// âââââââââââââââââââââââââââââââââââââââââââ
// ENVÃO A GOOGLE SHEETS
// âââââââââââââââââââââââââââââââââââââââââââ
async function enviarResultados(){
  if(!BACKEND_URL)return null;
  const{pcts}=getScores();
  const ss=getSoftScores();
  const sorted=Object.entries(pcts).sort((a,b)=>b[1]-a[1]);
  let correctas=0,totalEval=0;
  QS.forEach(q=>{
    if(q.options.some(o=>o.correct)){totalEval++;
      if(S.ans[q.id]!==undefined&&q.options[S.ans[q.id]].correct)correctas++}
  });
  function ssPct(k){const v=ss[k];return v&&v.m>0?Math.round(v.s/v.m*100):0}

  const payload={
    email:S.email,
    sessionToken:S.sessionToken,
    answers:S.ans,
    codigoPremio:S.prizeCode,tipoPremio:S.prizeType,
    familyKey:S.familyKey,
    familia1:FAM[sorted[0][0]].nombre,pctFamilia1:sorted[0][1],
    familia2:FAM[sorted[1][0]].nombre,pctFamilia2:sorted[1][1],
    correctas,totalEvaluables:totalEval,
    pctAcierto:totalEval>0?Math.round(correctas/totalEval*100):0,
    puntualidad:ssPct('puntualidad'),asertividad:ssPct('asertividad'),
    donGentes:ssPct('don_gentes'),resolucionConflictos:ssPct('resolucion_conflictos'),
    negociacion:ssPct('negociacion'),organizacion:ssPct('organizacion'),
    creatividad:ssPct('creatividad'),trabajoEquipo:ssPct('trabajo_equipo'),
    adaptabilidad:ssPct('adaptabilidad'),pensamientoCritico:ssPct('pensamiento_critico')
  };

  try{
    const data=await apiCall('submitResults',payload);
    const el=$('sentStatus');
    if(el)el.innerHTML='<span class="sent-ok">✅ Datos guardados correctamente</span>';
    return data;
  }catch(err){
    const el=$('sentStatus');
    if(el)el.innerHTML='<span class="sent-ok" style="background:var(--red-light);color:var(--red)">⚠️ No se pudieron guardar los datos: '+err.message+'</span>';
    return null;
  }
}

function validEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}

window.submitEmail=async function(){
  const i=$('emailInput');
  const err=$('emailErr');
  const btn=$('emailBtn');
  const email=(i?i.value:'').trim().toLowerCase();
  if(!validEmail(email)){err.textContent='Introduce un correo electrónico válido.';return}
  err.textContent='';
  if(btn){btn.disabled=true;btn.textContent='Enviando código…'}
  try{
    await apiCall('requestOtp',{email});
    S.email=email;S.otpError='';S.otpInfo='Hemos enviado un código de 6 dígitos a '+email+'. Revisa tu bandeja (y la carpeta de spam).';
    S.screen='otp';render();window.scrollTo({top:0,behavior:'smooth'});
  }catch(e){
    err.textContent=e.message||'Error de conexión';
    if(btn){btn.disabled=false;btn.textContent='Continuar →'}

window.submitOtp=async function(){
  const i=$('otpInput');
  const err=$('otpErr');
  const btn=$('otpBtn');
  const code=(i?i.value:'').trim();
  if(!/^\d{6}$/.test(code)){err.textContent='Introduce el código de 6 dígitos.';return}
  err.textContent='';
  if(btn){btn.disabled=true;btn.textContent='Verificando…'}
  try{
    const data=await apiCall('verifyOtp',{email:S.email,code});
    S.sessionToken=data.sessionToken||'';
    saveSession(S.email,S.sessionToken);
    if(data.found&&data.result){
      loadResultIntoState(S.email,data.result);
      S.screen='results';S.locked=true;
      render();window.scrollTo({top:0,behavior:'smooth'});
      return;
    }
    S.ans={};S.cq=0;S.locked=false;
    S.prizeCode='';S.prizeType=0;S.familyKey='';
    S.screen='quiz';render();window.scrollTo({top:0,behavior:'smooth'});
  }catch(e){
    S.otpError=e.message||'Código incorrecto';
    if(err)err.textContent=S.otpError;
    if(btn){btn.disabled=false;btn.textContent='Verificar y continuar →'}
  }
};

window.resendOtp=async function(){
  const btn=$('otpResend');
  const err=$('otpErr');
  if(btn){btn.disabled=true;btn.textContent='Enviando…'}
  try{
    await apiCall('requestOtp',{email:S.email});
    if(err){err.style.color='var(--green)';err.textContent='Código reenviado. Revisa tu correo.'}
    if(btn){btn.disabled=false;btn.textContent='Reenviar código'}
  }catch(e){
    if(err){err.style.color='var(--red)';err.textContent=e.message||'No se pudo reenviar.'}
    if(btn){btn.disabled=false;btn.textContent='Reenviar código'}
  }
};

function loadResultIntoState(email,r){
  S.email=email;
  S.ans=r.answers||{};
  S.prizeCode=r.prizeCode||'';
  S.prizeType=parseInt(r.prizeType,10)||0;
  S.familyKey=r.familyKey||'';
}

function pick(i){S.ans[QS[S.cq].id]=i;render()}
function next(){if(S.cq<QS.length-1){S.cq++;render();window.scrollTo({top:0,behavior:'smooth'})}}
function prev(){if(S.cq>0){S.cq--;render();window.scrollTo({top:0,behavior:'smooth'})}}
async function finish(){
  const {pcts}=getScores();
  const sorted=Object.entries(pcts).sort((a,b)=>b[1]-a[1]);
  S.familyKey=sorted[0][0];
  S.prizeCode=genCode();
  S.prizeType=pickRandomPrizeType();
  S.screen='results';S.locked=true;
  render();window.scrollTo({top:0,behavior:'smooth'});
  // Persistir en segundo plano
  try{
    const data=await enviarResultados();
    if(data&&data.alreadyExists&&data.result){
      // Ya había un resultado previo: usamos ese (respetamos el bloqueo server-side)
      loadResultIntoState(S.email,data.result);
      render();
    }
  }catch(e){console.log('submit error',e.message)}
}

function getImproveTip(skill){
  const tips={
    puntualidad:'Usa la regla del +15: pon alarmas 15 min antes. Prepara todo la noche anterior. Si vas a llegar tarde, avisa SIEMPRE con antelación.',
    asertividad:'Practica la técnica «entiendo + pero los datos dicen». No cambies de opinión por presión social si tienes argumentos sólidos.',
    don_gentes:'Empieza presentándote en situaciones de baja presión. Pregunta «¿Cómo estás?» y escucha la respuesta de verdad. El don de gentes se entrena.',
    resolucion_conflictos:'Usa la estructura «Situación + Impacto + Petición». Reconoce errores rápido con la fórmula «Error + Disculpa + Plan de acción».',
    negociacion:'Antes de negociar, investiga siempre. Lleva datos comparativos. Busca opciones donde ambas partes ganen (win-win).',
    organizacion:'Dedica 5 min cada noche a planificar el día siguiente. Instala Google Calendar o Notion. Establece convención de nombres para archivos.',
    creatividad:'Explora fuentes de inspiración diversas. Combina tu estilo creativo con otros estilos diferentes en equipo.',
    trabajo_equipo:'Ofrece ayuda específica, no genérica. Reconoce las aportaciones de cada persona. Di «Hemos» en lugar de «He».',
    adaptabilidad:'Ante cambios, pregúntate «¿Qué puedo aprender aquí?». La mejor forma de aprender software nuevo es usándolo directamente.',
    pensamiento_critico:'Verifica siempre las fuentes antes de actuar. Usa la frase «Déjame verificarlo y te confirmo» ante datos dudosos.'
  };
  return tips[skill]||'Trabaja esta competencia con práctica diaria y reflexión.';
}

function renderFeedback(filter){
  const c=$('feedbackList');if(!c)return;
  let html='';
  QS.forEach(q=>{
    const sel=S.ans[q.id];const chosen=sel!==undefined?q.options[sel]:null;
    const hasC=q.options.some(o=>o.correct);const isC=chosen&&chosen.correct;
    const correctOpt=q.options.find(o=>o.correct);
    let status,cls;
    if(!hasC){status='neutral';cls='partial'}
    else if(isC){status='correct';cls='correct'}
    else{status='incorrect';cls='incorrect'}
    if(filter!=='all'&&filter!==status)return;
    const icon=status==='correct'?'Correcta':status==='incorrect'?'A mejorar':'Orientativa';
    const chosenText=chosen?chosen.text:'(Sin responder)';
    html+=`<div class="fb-item ${cls}" data-type="${status}">
      <span class="fb-icon">${icon}</span>
      <div class="fb-q">${q.id}. ${q.text}</div>
      <div class="fb-ans yours"><div class="label">Tu respuesta${isC?' ✓':hasC?' ✗':''}</div>${chosenText}</div>
      ${hasC&&correctOpt&&!isC?`<div class="fb-ans ideal"><div class="label" style="color:var(--green)">Respuesta recomendada ✓</div>${correctOpt.text}</div>`:''}
      <div class="fb-explain">${isC||!hasC?'<strong>'+(isC?'¡Correcto! ':'💡 Orientación: ')+'</strong>'+q.idealExplanation:'<strong>¿Cómo mejorar?</strong> '+q.wrongExplanation}</div>
    </div>`;
  });
  c.innerHTML=html;
}

window.setFilter=function(f){
  document.querySelectorAll('.ftab').forEach(t=>t.classList.toggle('active',t.dataset.f===f));
  renderFeedback(f);
};

    <h1>Acceso Profesor</h1>
    <p>Introduce la contraseña y selecciona la familia profesional que gestionas.</p>
  </div>
  <div class="card">
    <label style="display:block;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Contraseña</label>
    <input id="teacherPass" type="password" placeholder="••••••••"
      style="width:100%;padding:13px;border:2px solid var(--border);border-radius:10px;font-family:'Outfit';font-size:16px;outline:none;margin-bottom:18px"
      onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'"
      onkeypress="if(event.key==='Enter')teacherLogin()">
    <label style="display:block;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Familia profesional</label>
    <div id="famPicker" style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px">
      ${Object.keys(FAM).map(k=>`
        <button class="opt" data-fam="${k}" onclick="selectFam('${k}')" style="justify-content:flex-start">
          <span class="opt-circle"></span>
          <span>${FAM[k].emoji} ${FAM[k].nombre}</span>
        </button>`).join('')}
    </div>
    <p id="loginErr" style="color:var(--red);font-size:13px;margin-bottom:10px;min-height:18px"></p>
    <button class="btn" onclick="teacherLogin()" style="width:100%">Entrar al panel →</button>
    <button class="btn btn-outline" style="width:100%;margin-top:8px" onclick="S.screen='intro';render()">← Volver al test</button>
  </div>
  <p class="footer">Panel exclusivo para profesorado del IES Luis Bueno Crespo</p>`;
  setTimeout(()=>{const i=$('teacherPass');if(i)i.focus()},100);
  // restore any previous selection visually
  if(S.teacherFamily){const b=document.querySelector('[data-fam="'+S.teacherFamily+'"]');if(b)b.classList.add('sel')}
}

window.selectFam=function(k){
  S.teacherFamily=k;
  document.querySelectorAll('#famPicker .opt').forEach(b=>b.classList.toggle('sel',b.dataset.fam===k));
};

window.teacherLogin=async function(){
  const pw=($('teacherPass')||{}).value||'';
  const err=$('loginErr');
  const btn=document.querySelector('.btn[onclick="teacherLogin()"]');
  if(!pw){err.textContent='Introduce la contraseña.';return}
  if(!S.teacherFamily){err.textContent='Selecciona una familia profesional.';return}
  if(!BACKEND_URL){err.textContent='Backend no configurado. Revisa BACKEND_URL en index.html.';return}
  err.textContent='Conectando…';
  if(btn){btn.disabled=true;btn.style.opacity='0.6'}
  try{
    const data=await apiCall('login',{password:pw,family:S.teacherFamily});
    teacherPassword=pw;
    cachedStock=data.stock;
    err.textContent='';
    S.screen='teacher';render();
  }catch(e){
    err.textContent=e.message==='unauthorized'?'Contraseña incorrecta.':('Error: '+e.message);
    if(btn){btn.disabled=false;btn.style.opacity='1'}
  }
};

// ═════════════════════════════════════════
// TEACHER PANEL (menu + scanner)
// ═════════════════════════════════════════
function renderTeacher(){
  const fk=S.teacherFamily;
  const fam=FAM[fk];
  const fc=(cachedStock&&cachedStock[fk])||{names:['Premio tipo 1','Premio tipo 2','Premio tipo 3'],counts:[0,0,0]};
  app.innerHTML=`
  <div class="hdr">
    <div class="hdr-badge">Panel Docente · ${fam.nombre}</div>
    <h1>${fam.emoji} ${fam.nombre}</h1>
    <p>Gestión de premios y lector de códigos QR</p>
  </div>

  <div class="card">
    <h3 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:4px">🎁 Stock de premios</h3>
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px">Edita el nombre y la cantidad disponible para cada tipo. Los cambios se guardan automáticamente.</p>
    ${[0,1,2].map(i=>`
      <div style="padding:14px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:10px;background:var(--bg)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:10px;font-weight:700;color:var(--green);letter-spacing:1.5px;text-transform:uppercase">Tipo ${i+1}</span>
          <span style="font-size:24px;font-weight:800;color:var(--${fk});font-family:'Fraunces',serif" id="cnt-${i}">${fc.counts[i]}</span>
        </div>
        <input type="text" value="${(fc.names[i]||'').replace(/"/g,'&quot;')}" id="pname-${i}" placeholder="Nombre del premio"
          style="width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:7px;font-family:'Outfit';font-size:13px;outline:none;margin-bottom:8px"
          onchange="updatePrizeName(${i},this.value)"
          onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'">
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn btn-outline" style="padding:7px 12px;font-size:13px" onclick="adjustCount(${i},-1)">−</button>
          <input type="number" value="${fc.counts[i]}" id="pcnt-${i}" min="0"
            style="flex:1;padding:7px;border:1.5px solid var(--border);border-radius:7px;font-family:'Outfit';font-size:14px;text-align:center;outline:none"
            onchange="setCount(${i},this.value)">
          <button class="btn btn-outline" style="padding:7px 12px;font-size:13px" onclick="adjustCount(${i},1)">+</button>
        </div>
      </div>`).join('')}
    <p style="font-size:11px;color:var(--muted);margin-top:4px">Total restante: <strong id="totalCount">${fc.counts.reduce((a,b)=>a+b,0)}</strong> premios</p>
  </div>

  <div class="card" style="text-align:center">
    <h3 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:10px">📷 Lector QR</h3>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Escanea el QR del alumno/a. Al leerlo se descontará automáticamente un premio del stock.</p>
    <video id="teacherVideo" style="width:100%;max-width:400px;border-radius:12px;border:3px solid var(--green);margin:0 auto;display:block" playsinline></video>
    <canvas id="teacherCanvas" style="display:none"></canvas>
    <p id="scanStatus" style="margin-top:12px;font-size:14px;color:var(--muted)">Iniciando cámara...</p>
    <button class="btn btn-outline" style="margin-top:10px;padding:8px 16px;font-size:13px" onclick="restartScanner()">🔄 Reiniciar escáner</button>
    <div id="scanResult" style="margin-top:16px;text-align:left"></div>
  </div>

  <div class="card" style="text-align:center">
    <h3 style="font-family:'Fraunces',serif;font-size:16px;margin-bottom:10px">O introduce el código manualmente</h3>
    <input id="manualCode" type="text" placeholder="Ej: LBC-A3K9N2"
      style="width:100%;max-width:300px;padding:11px;border:2px solid var(--border);border-radius:10px;font-family:'Outfit';font-size:15px;text-align:center;outline:none;margin-bottom:10px"
      onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'">
    <br><button class="btn" onclick="manualLookup()">Buscar código</button>
    <div id="manualResult" style="margin-top:16px;text-align:left"></div>
  </div>

  <button class="btn btn-outline" style="width:100%" onclick="teacherLogout()">🚪 Cerrar sesión</button>
  <p class="footer">IES Luis Bueno Crespo · Panel Docente</p>`;
  startCamera();
  // refresco en segundo plano para ver cambios de otros profes
  syncStock();
}

window.teacherLogout=function(){stopCamera();teacherPassword='';cachedStock=null;S.teacherFamily=null;S.screen='intro';render()};

async function syncStock(updateArgs){
  const body=Object.assign({password:teacherPassword,family:S.teacherFamily},updateArgs||{});
  const action=updateArgs?'updatePrize':'getStock';
  try{
    const data=await apiCall(action,body);
    if(data.stock){cachedStock=data.stock;refreshCounters()}
  }catch(e){
    const st=$('scanStatus');if(st)st.textContent='⚠️ Error de conexión: '+e.message;
  }
}

window.updatePrizeName=function(idx,val){
  const n=val.trim()||('Premio tipo '+(idx+1));
  if(cachedStock&&cachedStock[S.teacherFamily])cachedStock[S.teacherFamily].names[idx]=n;
  syncStock({index:idx,name:n});
};

window.setCount=function(idx,val){
  const n=Math.max(0,parseInt(val,10)||0);
  if(cachedStock&&cachedStock[S.teacherFamily])cachedStock[S.teacherFamily].counts[idx]=n;
  refreshCounters();
  syncStock({index:idx,count:n});
};

window.adjustCount=function(idx,delta){
  const fc=cachedStock&&cachedStock[S.teacherFamily];
  if(!fc)return;
  const n=Math.max(0,(fc.counts[idx]||0)+delta);
  fc.counts[idx]=n;
  refreshCounters();
  syncStock({index:idx,count:n});
};

function refreshCounters(){
  const fc=cachedStock&&cachedStock[S.teacherFamily];if(!fc)return;
  [0,1,2].forEach(i=>{
    const el=$('cnt-'+i);if(el)el.textContent=fc.counts[i];
    const inp=$('pcnt-'+i);if(inp&&document.activeElement!==inp)inp.value=fc.counts[i];
    const nm=$('pname-'+i);if(nm&&document.activeElement!==nm)nm.value=fc.names[i]||'';
  });
  const tot=$('totalCount');if(tot)tot.textContent=fc.counts.reduce((a,b)=>a+b,0);
}

let cameraStream=null,scanInterval=null;
function startCamera(){
  const v=$('teacherVideo'),cn=$('teacherCanvas'),st=$('scanStatus');
  if(!v)return;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){st.textContent='⚠ Cámara no soportada. Usa el campo manual.';return}
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
  .then(stream=>{cameraStream=stream;v.srcObject=stream;v.play();st.textContent='📷 Cámara activa. Apunta al QR del alumno/a.';
    if(typeof jsQR!=='undefined'){scanInterval=setInterval(()=>scanFrame(v,cn),300);return}
    const sc=document.createElement('script');sc.src='https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';
    sc.onload=()=>{scanInterval=setInterval(()=>scanFrame(v,cn),300)};
    sc.onerror=()=>{st.textContent='⚠️ No se pudo cargar el lector QR. Usa el campo manual.'};
    document.head.appendChild(sc);
  }).catch(()=>{st.textContent='⚠️ No se pudo acceder a la cámara. Usa el campo manual.'});
}

window.restartScanner=function(){
  $('scanResult').innerHTML='';
  const st=$('scanStatus');if(st)st.textContent='📷 Cámara activa. Apunta al QR del alumno/a.';
  if(scanInterval)clearInterval(scanInterval);
  const v=$('teacherVideo'),cn=$('teacherCanvas');
  if(v&&cn&&typeof jsQR!=='undefined')scanInterval=setInterval(()=>scanFrame(v,cn),300);
};

function scanFrame(v,cn){
  if(!v||v.readyState!==v.HAVE_ENOUGH_DATA)return;
  const ctx=cn.getContext('2d');cn.width=v.videoWidth;cn.height=v.videoHeight;
  ctx.drawImage(v,0,0);const img=ctx.getImageData(0,0,cn.width,cn.height);
  if(typeof jsQR==='undefined')return;
  const code=jsQR(img.data,img.width,img.height);
  if(code){clearInterval(scanInterval);processQR(code.data,'scanResult');const st=$('scanStatus');if(st)st.textContent='✅ ¡QR leído correctamente!';}
}

function stopCamera(){if(scanInterval){clearInterval(scanInterval);scanInterval=null}if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null}}

async function redeemPrize(info,tid){
  const t=$(tid);
  const fk=S.teacherFamily;
  const pt=parseInt(info.prizeType,10);

  // Chequeo cliente: el QR debe pertenecer a la familia del profe que escanea
  if(info.familyKey && info.familyKey!==fk){
    const targetFam=FAM[info.familyKey];
    const targetLabel=targetFam?(targetFam.emoji+' '+targetFam.nombre):info.familyKey;
    t.innerHTML=`<div class="card" style="border:2px solid var(--amber);text-align:left">
      <h3 style="font-family:'Fraunces',serif;font-size:16px;color:var(--amber);margin-bottom:8px">⚠️ Stand incorrecto</h3>
      <p style="font-size:13px">Este QR pertenece al stand de <strong>${targetLabel}</strong>.</p>
      <p style="font-size:12px;color:var(--muted);margin-top:6px">Indica al alumno/a que vaya a ese stand para recoger su premio. No se ha descontado nada del stock.</p>
    </div>`;
    return;
  }

  t.innerHTML=`<div class="card" style="text-align:center"><p style="color:var(--muted)">Canjeando premio…</p></div>`;

  let data;
  try{
    data=await apiCall('redeem',{
      password:teacherPassword,
      family:fk,
      qrFamilyKey:info.familyKey||fk,
      prizeType:pt,
      code:info.code,
      studentName:info.email||info.name||''
    });
  }catch(e){
    t.innerHTML=`<div class="card" style="border:2px solid var(--red)"><p style="color:var(--red);font-weight:600">⚠️ Error de conexión: ${e.message}</p></div>`;
    return;
  }

  if(data.wrongStand){
    const targetFam=FAM[data.expectedFamily];
    const targetLabel=targetFam?(targetFam.emoji+' '+targetFam.nombre):data.expectedFamily;
    t.innerHTML=`<div class="card" style="border:2px solid var(--amber);text-align:left">
      <h3 style="font-family:'Fraunces',serif;font-size:16px;color:var(--amber);margin-bottom:8px">⚠️ Stand incorrecto</h3>
      <p style="font-size:13px">Este QR pertenece al stand de <strong>${targetLabel}</strong>.</p>
      <p style="font-size:12px;color:var(--muted);margin-top:6px">Indícale que vaya a ese stand.</p>
    </div>`;
    return;
  }

  if(data.stock){cachedStock=data.stock;refreshCounters()}
  const prizeName=data.prizeName||('Premio tipo '+pt);

  let stockNote='';
  if(data.redeemed){
    stockNote=`<p style="font-size:12px;color:var(--green);margin-top:6px">✓ Descontado del stock. Quedan <strong>${data.remaining}</strong> premios de tipo ${pt}.</p>`;
  }else if(data.alreadyRedeemed){
    const prev=data.previousScan||{};
    stockNote=`<p style="font-size:12px;color:var(--amber);margin-top:6px">⚠️ Este código ya fue canjeado anteriormente (${(prev.date||'').slice(0,10)}). No se descuenta de nuevo.</p>`;
  }else if(data.noStock){
    stockNote=`<p style="font-size:12px;color:var(--red);margin-top:6px">⚠️ Sin stock disponible de tipo ${pt}. Asigna otro premio manualmente.</p>`;
  }

  t.innerHTML=`<div class="card" style="border:2px solid var(--green);margin-bottom:0">
    <h3 style="font-family:'Fraunces',serif;font-size:18px;color:var(--green);margin-bottom:10px">🎓 Datos del alumno/a</h3>
    <p style="font-size:13px;word-break:break-all"><strong>Correo:</strong> ${info.email||info.name||'—'}</p>
    <p style="font-size:13px"><strong>Código:</strong> ${info.code||'—'}</p>
    <p style="font-size:13px"><strong>Familia recomendada:</strong> ${info.family||'—'} ✓</p>
    <p style="font-size:13px"><strong>Puntuación:</strong> ${info.score||'—'}%</p>
    <p style="font-size:13px"><strong>Fecha:</strong> ${info.date||'—'}</p>
    <div style="margin-top:14px;padding:18px;background:var(--green-light);border-radius:10px;text-align:center">
      <div class="prize-label">🎁 Premio asignado</div>
      <div style="font-family:'Fraunces',serif;font-size:14px;color:var(--green);font-weight:700;margin-top:4px">TIPO ${pt}</div>
      <div class="prize-name" style="margin-top:6px">${prizeName}</div>
      ${stockNote}
    </div>
  </div>`;
}

function processQR(data,tid){
  const t=$(tid);
  try{
    const info=JSON.parse(data);
    if(!info.prizeType){
      t.innerHTML=`<div class="card" style="border:2px solid var(--amber)"><p style="color:var(--amber);font-weight:600">⚠️ Código QR antiguo sin tipo de premio asignado.</p></div>`;
      return;
    }
    redeemPrize(info,tid);
  }catch(e){
    t.innerHTML=`<div class="card" style="border:2px solid var(--red);text-align:center"><p style="color:var(--red);font-weight:600">⚠️ Código no reconocido.</p></div>`;
  }
}

window.manualLookup=function(){
  const code=($('manualCode')||{}).value;
  if(!code||!code.trim()){$('manualResult').innerHTML='<p style="color:var(--red)">Introduce un código.</p>';return}
  $('manualResult').innerHTML=`<div class="card" style="border:2px solid var(--amber);text-align:center">
    <p style="color:var(--amber);font-weight:600;font-size:13px">⚠️ El código manual no contiene el tipo de premio asignado.</p>
    <p style="font-size:12px;color:var(--muted);margin-top:6px">Asigna manualmente un tipo usando los botones de stock arriba. Código registrado: <strong>${code.trim().toUpperCase()}</strong></p>
  </div>`;
};

async function bootstrap(){
  render(); // pinta la intro mientras resolvemos
  const sess=loadSession();
  if(!sess||!BACKEND_URL)return;
  try{
    const data=await apiCall('getMyResults',{email:sess.email,sessionToken:sess.sessionToken});
    S.email=sess.email;S.sessionToken=sess.sessionToken;
    if(data.found){
      loadResultIntoState(sess.email,data.result);
      S.screen='results';S.locked=true;
      render();
    }
  }catch(e){
    // Sesión caducada o inválida: limpiamos y volvemos a la intro
    clearSession();
  }
}
bootstrap();
</script>
