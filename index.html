// SCORING
// ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
function getScores(){
  const t={admin:0,comercio:0,obra:0,electro:0,textil:0};
  const mx={admin:0,comercio:0,obra:0,electro:0,textil:0};
  QS.forEach(q=>{
    Object.keys(t).forEach(f=>{mx[f]+=Math.max(...q.options.map(o=>o.scores[f]))});
    if(S.ans[q.id]!==undefined){const c=q.options[S.ans[q.id]];Object.keys(t).forEach(f=>{t[f]+=c.scores[f]})}
  });
  const pcts={};Object.keys(t).forEach(f=>{pcts[f]=mx[f]>0?Math.round(t[f]/mx[f]*100):0});
  return{totals:t,pcts};
}

function getSoftScores(){
  const sk={};Object.keys(SSKILLS).forEach(k=>{sk[k]={s:0,m:0,correct:0,total:0}});
  QS.filter(q=>q.section==='soft').forEach(q=>{
    const k=q.skill;if(!sk[k])return;sk[k].total++;
    const mx=Math.max(...q.options.map(o=>Object.values(o.scores).reduce((a,b)=>a+b,0)));
    sk[k].m+=mx;
    if(S.ans[q.id]!==undefined){const c=q.options[S.ans[q.id]];sk[k].s+=Object.values(c.scores).reduce((a,b)=>a+b,0);if(c.correct)sk[k].correct++}
  });
  return sk;
}

async function enviarResultados(){
  if(!BACKEND_URL)return null;
  const{pcts}=getScores();
  const ss=getSoftScores();
  const sorted=Object.entries(pcts).sort((a,b)=>b[1]-a[1]);
  let correctas=0,totalEval=0;
  QS.forEach(q=>{
    if(q.options.some(o=>o.correct)){totalEval++;
      if(S.ans[q.id]!==undefined&&q.options[S.ans[q.id]].correct)correctas++}
  });
  function ssPct(k){const v=ss[k];return v&&v.m>0?Math.round(v.s/v.m*100):0}

  const payload={
    email:S.email,
    sessionToken:S.sessionToken,
    answers:S.ans,
    codigoPremio:S.prizeCode,tipoPremio:S.prizeType,
    familyKey:S.familyKey,
    familia1:FAM[sorted[0][0]].nombre,pctFamilia1:sorted[0][1],
    familia2:FAM[sorted[1][0]].nombre,pctFamilia2:sorted[1][1],
    correctas,totalEvaluables:totalEval,
    pctAcierto:totalEval>0?Math.round(correctas/totalEval*100):0,
    puntualidad:ssPct('puntualidad'),asertividad:ssPct('asertividad'),
    donGentes:ssPct('don_gentes'),resolucionConflictos:ssPct('resolucion_conflictos'),
    negociacion:ssPct('negociacion'),organizacion:ssPct('organizacion'),
    creatividad:ssPct('creatividad'),trabajoEquipo:ssPct('trabajo_equipo'),
    adaptabilidad:ssPct('adaptabilidad'),pensamientoCritico:ssPct('pensamiento_critico')
  };

  try{
    const data=await apiCall('submitResults',payload);
    const el=$('sentStatus');
    if(el)el.innerHTML='<span class="sent-ok">â Datos guardados correctamente</span>';
    return data;
  }catch(err){
    const el=$('sentStatus');
    if(el)el.innerHTML='<span class="sent-ok" style="background:var(--red-light);color:var(--red)">â ïž No se pudieron guardar los datos: '+err.message+'</span>';
    return null;
  }
}

window.submitOtp=async function(){
  const i=$('otpInput');
  const err=$('otpErr');
  const btn=$('otpBtn');
  const code=(i?i.value:'').trim();
  if(!/^\d{6}$/.test(code)){err.textContent='Introduce el cĂłdigo de 6 dĂ­gitos.';return}
  err.textContent='';
  if(btn){btn.disabled=true;btn.textContent='VerificandoâŠ'}
  try{
    const data=await apiCall('verifyOtp',{email:S.email,code});
    S.sessionToken=data.sessionToken||'';
    S.liveMode=!!data.liveMode;
    if(data.secondsPerQuestion!==undefined)S.secondsPerQuestion=parseInt(data.secondsPerQuestion,10)||0;
    saveSession(S.email,S.sessionToken);
    if(data.found&&data.result){
      loadResultIntoState(S.email,data.result);
      S.screen='results';S.locked=!!S.liveMode;
      render();window.scrollTo({top:0,behavior:'smooth'});
      return;
    }
    S.locked=false;
    S.prizeCode='';S.prizeType=0;S.familyKey='';
    if(data.progress){loadProgressIntoState(data.progress)}else{S.ans={};S.cq=0}
    S.screen='quiz';render();window.scrollTo({top:0,behavior:'smooth'});
  }catch(e){
    S.otpError=e.message||'CĂłdigo incorrecto';
    if(err)err.textContent=S.otpError;
    if(btn){btn.disabled=false;btn.textContent='Verificar y continuar â'}
  }
};

};

function stopQuestionTimer(){
  if(questionTimerId){clearInterval(questionTimerId);questionTimerId=null}
  S.timerForQuestion=-1;
}
function fmtTime(s){const m=Math.floor(s/60),x=s%60;return (m<10?'0':'')+m+':'+(x<10?'0':'')+x}
function startQuestionTimer(){
  const limit=parseInt(S.secondsPerQuestion,10)||0;
  if(limit<=0)return;
  if(S.timerForQuestion===S.cq&&questionTimerId)return;
  stopQuestionTimer();
  S.timerForQuestion=S.cq;
  S.timerSeconds=limit;
  const tick=()=>{
    if(S.screen!=='quiz'){stopQuestionTimer();return}
    const el=document.getElementById('qTimer');
    if(el)el.textContent=fmtTime(S.timerSeconds);
    if(S.timerSeconds<=0){
      stopQuestionTimer();
      if(S.cq>=QS.length-1){finish()}else{next()}
      return;
    }
    S.timerSeconds--;
  };
  tick();
  questionTimerId=setInterval(tick,1000);
}

async function finish(){

  S.screen='results';S.locked=true;
  render();window.scrollTo({top:0,behavior:'smooth'});

    if(data&&data.alreadyExists&&data.result){
      loadResultIntoState(S.email,data.result);
      render();
    }
  }catch(e){console.log('submit error',e.message)}
}

function renderFeedback(filter){
  const c=$('feedbackList');if(!c)return;
  let html='';
  QS.forEach(q=>{
    const sel=S.ans[q.id];const chosen=sel!==undefined?q.options[sel]:null;
    const hasC=q.options.some(o=>o.correct);const isC=chosen&&chosen.correct;
    const correctOpt=q.options.find(o=>o.correct);
    let status,cls;
    if(!hasC){status='neutral';cls='partial'}
    else if(isC){status='correct';cls='correct'}

    const icon=status==='correct'?'Correcta':status==='incorrect'?'A mejorar':'Orientativa';

    html+=`<div class="fb-item ${cls}" data-type="${status}">

      <div class="fb-ans yours"><div class="label">Tu respuesta${isC?' â':hasC?' â':''}</div>${chosenText}</div>

}

let cameraStream=null,scanInterval=null;
function startCamera(){
  const v=$('teacherVideo'),cn=$('teacherCanvas'),st=$('scanStatus');
  if(!v)return;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){st.textContent='â  CĂĄmara no soportada. Usa el campo manual.';return}
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
  .then(stream=>{cameraStream=stream;v.srcObject=stream;v.play();st.textContent='đ· CĂĄmara activa. Apunta al QR del alumno/a.';
    if(typeof jsQR!=='undefined'){scanInterval=setInterval(()=>scanFrame(v,cn),300);return}
    const sc=document.createElement('script');sc.src='https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';
    sc.onload=()=>{scanInterval=setInterval(()=>scanFrame(v,cn),300)};
    sc.onerror=()=>{st.textContent='â ïž No se pudo cargar el lector QR. Usa el campo manual.'};
    document.head.appendChild(sc);
  }).catch(()=>{st.textContent='â ïž No se pudo acceder a la cĂĄmara. Usa el campo manual.'});
}

window.restartScanner=function(){
  $('scanResult').innerHTML='';
  const st=$('scanStatus');if(st)st.textContent='đ· CĂĄmara activa. Apunta al QR del alumno/a.';
  if(scanInterval)clearInterval(scanInterval);
  const v=$('teacherVideo'),cn=$('teacherCanvas');
  if(v&&cn&&typeof jsQR!=='undefined')scanInterval=setInterval(()=>scanFrame(v,cn),300);
};

function scanFrame(v,cn){
  if(!v||v.readyState!==v.HAVE_ENOUGH_DATA)return;
  const ctx=cn.getContext('2d');cn.width=v.videoWidth;cn.height=v.videoHeight;
  ctx.drawImage(v,0,0);const img=ctx.getImageData(0,0,cn.width,cn.height);
  if(typeof jsQR==='undefined')return;
  const code=jsQR(img.data,img.width,img.height);
  if(code){clearInterval(scanInterval);processQR(code.data,'scanResult');const st=$('scanStatus');if(st)st.textContent='â ÂĄQR leĂ­do correctamente!';}
}

function stopCamera(){if(scanInterval){clearInterval(scanInterval);scanInterval=null}if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null}}

window.adminSavePrizes=async function(){
  const msg=$('prizeMsg');
  const btn=$('savePrizesBtn');
  if(btn){btn.disabled=true;btn.textContent='GuardandoâŠ'}
  let body={adminPassword,mode:currentPrizeMode};
  if(currentPrizeMode==='uniform'){
    body.names=[0,1,2].map(i=>($('uName'+i)||{}).value||'Premio tipo '+(i+1));
    body.counts=[0,1,2].map(i=>parseInt(($('uCount'+i)||{}).value,10)||0);

    const prizes={};

        names:[0,1,2].map(i=>($('c_'+fk+'_n'+i)||{}).value||'Premio tipo '+(i+1)),

async function loadAdminStats(){

    const stock=data.stock||{};
    const ini=cfg.initialStock||{};

    FKEYS.forEach(fk=>{
      const f=FAM[fk];
      [1,2,3].forEach((pt,pi)=>{
        const total=ini[fk]?ini[fk].counts[pi]:'-';
        const remaining=stock[fk]?stock[fk].counts[pi]:0;
        const distributed=stats[fk]?stats[fk][pt]:0;
        const name=stock[fk]?stock[fk].names[pi]:'';
        html+=`<tr style="border-bottom:1px solid var(--border)${pi===0?';border-top:2px solid var(--border)':''}">
          <td style="padding:5px;font-weight:${pi===0?'600':'400'}">${pi===0?(f.emoji+' '+f.nombre):''}</td>
          <td style="padding:5px;text-align:center;color:var(--muted)">${name||'T'+pt}</td>
          <td style="padding:5px;text-align:center">${total}</td>
          <td style="padding:5px;text-align:center;color:var(--amber);font-weight:600">${distributed}</td>
          <td style="padding:5px;text-align:center;color:var(--green);font-weight:600">${remaining}</td>
        </tr>`;
      });
    });
    html+=`</table>`;
    card.innerHTML=html;
  }catch(e){
    card.innerHTML=`<p style="color:var(--red)">Error cargando estadĂ­sticas: ${e.message}</p>`;

}

    const data=await apiCall('getMyResults',{email:sess.email,sessionToken:sess.sessionToken});
    S.email=sess.email;S.sessionToken=sess.sessionToken;
    if(data.liveMode!==undefined)S.liveMode=!!data.liveMode;
    if(data.found){
      loadResultIntoState(sess.email,data.result);
      S.screen='results';S.locked=!!S.liveMode;
      render();
    }else if(data.progress){
      loadProgressIntoState(data.progress);
      S.locked=false;S.prizeCode='';S.prizeType=0;S.familyKey='';
      S.screen='quiz';render();
    }
  }catch(e){
    clearSession();
  }
}
bootstrap();
</script>
</body>
</html>
